services:
  ai-factory:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ai-factory
    volumes:
      - ./:/workspace
      - ai_factory_home:/home/factory
      - claude:/home/factory/.claude
    env_file:
      - .env
    tty: true

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - N8N_PORT=5678
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - ai-factory

  openclaw:
    image: openclaw/openclaw:latest
    container_name: openclaw
    restart: always
    ports:
      - "8080:8080"
    environment:
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - OPENCLAW_TELEGRAM_TOKEN=${OPENCLAW_TELEGRAM_TOKEN}
      - OPENCLAW_LLM_PROVIDER=${OPENCLAW_LLM_PROVIDER:-anthropic}
      - OPENCLAW_API_KEY=${OPENCLAW_API_KEY}
      - OPENCLAW_ALLOW_LIST=${OPENCLAW_ALLOW_LIST}
    volumes:
      - openclaw_data:/home/openclaw/.openclaw
      - ./openclaw/config.yaml:/home/openclaw/.openclaw/config.yaml:ro
    depends_on:
      - ai-factory
    networks:
      - ai-network

volumes:
  ai_factory_home:
  claude:
  n8n_data:
  openclaw_data:

networks:
  ai-network:
    driver: bridge
