services:
  ai-factory:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ai-factory
    volumes:
      - ./:/workspace
      - ai_factory_home:/home/factory
      - claude:/home/factory/.claude
    env_file:
      - .env
    tty: true

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: always
    ports:
      - "18789:18789"
    environment:
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_CONFIG_DIR=/home/node/.openclaw
    volumes:
      - openclaw_config:/home/factory/.openclaw
      - openclaw_workspace:/home/factory/.openclaw/workspace
    depends_on:
      - ai-factory
    networks:
      - ai-network

volumes:
  ai_factory_home:
  claude:
  openclaw_config:
  openclaw_workspace:

networks:
  ai-network:
    driver: bridge
