services:
  ai-factory:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ai-factory
    volumes:
      - ./:/workspace
      - ai_factory_home:/home/factory
      - claude:/home/factory/.claude
    env_file:
      - .env
    tty: true

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - N8N_PORT=5678
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - ai-factory

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: always
    ports:
      - "18789:18789"
    environment:
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_CONFIG_DIR=/home/node/.openclaw
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    depends_on:
      - ai-factory
    networks:
      - ai-network

volumes:
  ai_factory_home:
  claude:
  n8n_data:
  openclaw_config:
  openclaw_workspace:

networks:
  ai-network:
    driver: bridge
